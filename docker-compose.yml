version: "3.9"

services:
  embedding-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn services.embedding_service.app.main:app --host 0.0.0.0 --port 8001"
    ports:
      - "8001:8001"

  retrieval-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn services.retrieval_service.app.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    depends_on:
      - embedding-service
      - llm-generation-service

  llm-generation-service:
    image: python:3.12-slim
    working_dir: /app
    volumes:
      - ./:/app
    env_file:
      - .env
    command: >
      sh -c "pip install -r requirements.txt &&
      uvicorn services.llm_generation_service.app.main:app --host 0.0.0.0 --port 8002"
    ports:
      - "8002:8002"
